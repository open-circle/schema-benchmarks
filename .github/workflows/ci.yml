name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
      - run: vp check
  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium
      - name: Test
        run: vp test
