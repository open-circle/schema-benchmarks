name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
      - uses: CatChen/oxlint-suggestion-action@v1
        with:
          fail-check: true
  format:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
      - name: Format
        run: pnpm format
      - uses: CatChen/check-git-status-action@v2
        with:
          fail-if-not-clean: true
          request-changes-if-not-clean: true
          request-changes-comment: "Unformatted files detected. Please run `pnpm format` and commit the changes."
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website
      - name: Typecheck
        run: pnpm typecheck
  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/environments/website

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Test
        run: pnpm test
