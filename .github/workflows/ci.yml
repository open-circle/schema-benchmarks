name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/environments
      - name: Build schemas
        shell: bash
        env:
          TTSC_CACHE_DIR: ${{ runner.temp }}/ttsc-cache
          TTSC_GO_CACHE_DIR: ${{ runner.temp }}/ttsc-go-build
        run: pnpm schemas:build
      - name: Build website
        run: pnpm website:build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            schemas/dist/
            website/dist/
            website/.content-collections/
            website/.netlify/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/environments
      - uses: CatChen/oxlint-suggestion-action@v1
        with:
          fail-check: true
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/environments
      - name: Format
        run: pnpm format
      - uses: CatChen/check-git-status-action@v2
        with:
          fail-if-not-clean: true
          request-changes-if-not-clean: true
          request-changes-comment: "Unformatted files detected. Please run `pnpm format` and commit the changes."
  typecheck:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Setup environment
        uses: ./.github/actions/environments
      - name: Typecheck
        run: pnpm typecheck
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Setup environment
        uses: ./.github/actions/environments
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Test
        run: pnpm test
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Setup environment
        uses: ./.github/actions/environments
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E Test
        run: pnpm e2e --grep @smoke --workers '50%'
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: "*/playwright-report/"
          retention-days: 30
