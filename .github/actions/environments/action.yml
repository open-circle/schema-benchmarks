name: Setup environment
description: Setup environment with Node.js and pnpm, plus building schemas

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        node-version-file: .node-version
        cache: true
        run-install: true

    - name: Build schemas
      shell: bash
      run: vp run @schema-benchmarks/schemas#build
